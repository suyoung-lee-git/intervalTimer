<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="인터벌">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>인터벌 타이머</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-prepare: #1E90FF;
    --color-work: #FF3B30;
    --color-rest: #34C759;
    --color-round-rest: #FF9500;
    --color-done: #8E8E93;
    --color-idle: #1C1C1E;
    --bg: #000;
    --surface: #1C1C1E;
    --text: #FFFFFF;
    --text-secondary: rgba(255,255,255,0.6);
    --phase-color: var(--color-idle);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    -webkit-text-size-adjust: 100%;
    overflow: hidden;
    touch-action: manipulation;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding-top: max(16px, var(--safe-top));
    padding-bottom: max(16px, var(--safe-bottom));
    transition: background-color 0.4s ease;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 12px;
    flex-shrink: 0;
  }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }
  #btn-settings {
    background: none; border: none; color: var(--text); cursor: pointer;
    width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
    border-radius: 12px; font-size: 22px;
  }
  #btn-settings:active { background: rgba(255,255,255,0.1); }

  /* MAIN TIMER DISPLAY */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    gap: 8px;
  }

  #phase-label {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--phase-color);
    transition: color 0.3s;
    min-height: 20px;
  }

  #time-display {
    font-size: clamp(72px, 22vw, 120px);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -4px;
    line-height: 1;
    color: var(--text);
    transition: color 0.3s;
  }
  #time-display.pulse { animation: pulse 0.15s ease; }
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  #set-info {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 1px;
  }
  #round-info {
    font-size: 14px;
    color: var(--text-secondary);
    letter-spacing: 1px;
  }

  /* PROGRESS BAR */
  #progress-wrap {
    width: 100%;
    max-width: 340px;
    margin-top: 16px;
  }
  #progress-bar-bg {
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    background: var(--phase-color);
    border-radius: 3px;
    width: 0%;
    transition: width 0.25s linear, background-color 0.3s;
  }

  /* CONTROLS */
  footer {
    display: flex;
    gap: 12px;
    padding: 0 20px;
    flex-shrink: 0;
  }
  .btn {
    flex: 1;
    height: 56px;
    border: none;
    border-radius: 16px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: 0.7; transform: scale(0.97); }

  #btn-start {
    background: var(--phase-color);
    color: #fff;
    transition: background-color 0.3s;
  }
  #btn-reset {
    background: var(--surface);
    color: var(--text);
  }

  /* SETTINGS MODAL */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #modal-overlay.open { opacity: 1; pointer-events: all; }

  #modal {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #1C1C1E;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px max(20px, var(--safe-bottom));
    z-index: 101;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 85vh;
    overflow-y: auto;
  }
  #modal.open { transform: translateY(0); }

  .modal-handle {
    width: 36px; height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    margin: 0 auto 20px;
  }

  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .setting-row:last-of-type { border-bottom: none; }

  .setting-label { font-size: 15px; color: var(--text); }
  .setting-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .stepper {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .stepper-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.12);
    color: var(--text);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .stepper-btn:active { background: rgba(255,255,255,0.25); }
  .stepper-val {
    min-width: 52px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    background: none; border: none;
    cursor: pointer;
  }
  /* inline edit */
  .stepper-val:focus {
    outline: none;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
  }

  #btn-modal-close {
    width: 100%; height: 50px;
    margin-top: 20px;
    border-radius: 14px;
    border: none;
    background: var(--color-work);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
  }

  /* PRESETS */
  .preset-section {
    margin-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 20px;
  }
  .preset-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .preset-section-title { font-size: 15px; font-weight: 700; }
  #btn-save-preset {
    background: rgba(255,255,255,0.1);
    border: none;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #btn-save-preset:active { background: rgba(255,255,255,0.2); }
  #preset-list { display: flex; flex-direction: column; gap: 8px; }
  .preset-item {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 10px 12px;
    gap: 10px;
  }
  .preset-item.active { background: rgba(255,255,255,0.14); }
  .preset-info { flex: 1; min-width: 0; }
  .preset-name {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preset-desc { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .preset-apply {
    background: rgba(255,255,255,0.12);
    border: none; color: var(--text);
    font-size: 13px; font-weight: 600;
    padding: 6px 12px; border-radius: 8px;
    cursor: pointer; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .preset-apply:active { background: rgba(255,255,255,0.25); }
  .preset-delete {
    background: none; border: none;
    color: rgba(255,255,255,0.35);
    font-size: 18px; line-height: 1;
    cursor: pointer; padding: 4px;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .preset-delete:active { color: var(--color-work); }
  .preset-empty {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
    padding: 16px 0;
  }

  /* NAME INPUT OVERLAY */
  #name-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  #name-overlay.open { opacity: 1; pointer-events: all; }
  #name-box {
    width: 100%;
    background: #2C2C2E;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px max(20px, var(--safe-bottom));
  }
  #name-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  #preset-name-input {
    width: 100%; height: 48px;
    background: rgba(255,255,255,0.08);
    border: none; border-radius: 12px;
    color: var(--text); font-size: 16px;
    padding: 0 14px; margin-bottom: 12px;
  }
  #preset-name-input:focus { outline: 2px solid rgba(255,255,255,0.25); }
  .name-box-btns { display: flex; gap: 8px; }
  .name-box-btns button {
    flex: 1; height: 48px; border-radius: 12px;
    border: none; font-size: 16px; font-weight: 600; cursor: pointer;
  }
  #btn-name-cancel { background: rgba(255,255,255,0.1); color: var(--text); }
  #btn-name-confirm { background: var(--color-work); color: #fff; }

  /* DONE STATE */
  #done-overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000;
    z-index: 50;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s;
  }
  #done-overlay.show { opacity: 1; pointer-events: all; }
  #done-overlay .done-emoji { font-size: 72px; margin-bottom: 16px; }
  #done-overlay .done-text { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  #done-overlay .done-sub { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; }
  #btn-done-reset {
    padding: 14px 40px;
    border-radius: 16px;
    border: none;
    background: var(--color-work);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 id="main-title">인터벌 타이머</h1>
    <button id="btn-settings" aria-label="설정">⚙️</button>
  </header>

  <main>
    <div id="phase-label">준비</div>
    <div id="time-display">00:00</div>
    <div id="set-info">SET — / —</div>
    <div id="round-info">ROUND — / —</div>
    <div id="progress-wrap">
      <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    </div>
  </main>

  <footer>
    <button class="btn" id="btn-reset">초기화</button>
    <button class="btn" id="btn-start">시작</button>
  </footer>
</div>

<!-- Settings Modal -->
<div id="modal-overlay"></div>
<div id="modal" role="dialog" aria-modal="true" aria-label="설정">
  <div class="modal-handle"></div>
  <div class="modal-title">타이머 설정</div>

  <div class="setting-row">
    <div><div class="setting-label">준비 시간</div><div class="setting-sub">운동 시작 전 준비</div></div>
    <div class="stepper" data-key="prepare" data-min="3" data-max="60" data-step="1" data-unit="s"></div>
  </div>
  <div class="setting-row">
    <div><div class="setting-label">운동 시간</div><div class="setting-sub">세트당 운동 시간</div></div>
    <div class="stepper" data-key="work" data-min="5" data-max="300" data-step="5" data-unit="s"></div>
  </div>
  <div class="setting-row">
    <div><div class="setting-label">휴식 시간</div><div class="setting-sub">세트 간 휴식</div></div>
    <div class="stepper" data-key="rest" data-min="0" data-max="300" data-step="5" data-unit="s"></div>
  </div>
  <div class="setting-row">
    <div><div class="setting-label">세트 수</div><div class="setting-sub">라운드당 세트</div></div>
    <div class="stepper" data-key="sets" data-min="1" data-max="30" data-step="1" data-unit="회"></div>
  </div>
  <div class="setting-row">
    <div><div class="setting-label">라운드 수</div><div class="setting-sub">총 라운드</div></div>
    <div class="stepper" data-key="rounds" data-min="1" data-max="10" data-step="1" data-unit="회"></div>
  </div>
  <div class="setting-row">
    <div><div class="setting-label">라운드 간 휴식</div><div class="setting-sub">라운드 사이 휴식</div></div>
    <div class="stepper" data-key="roundRest" data-min="0" data-max="300" data-step="5" data-unit="s"></div>
  </div>

  <div class="preset-section">
    <div class="preset-section-header">
      <span class="preset-section-title">프리셋</span>
      <button id="btn-save-preset">+ 저장</button>
    </div>
    <div id="preset-list"></div>
  </div>

  <button id="btn-modal-close">완료</button>
</div>

<!-- Preset name input overlay -->
<div id="name-overlay">
  <div id="name-box">
    <h3>프리셋 이름</h3>
    <input id="preset-name-input" type="text" maxlength="20" placeholder="예) 타바타, 웜업...">
    <div class="name-box-btns">
      <button id="btn-name-cancel">취소</button>
      <button id="btn-name-confirm">저장</button>
    </div>
  </div>
</div>

<!-- Done overlay -->
<div id="done-overlay">
  <div class="done-emoji">🎉</div>
  <div class="done-text">완료!</div>
  <div class="done-sub" id="done-summary"></div>
  <button id="btn-done-reset">다시 시작</button>
</div>

<script>
// ── DEFAULTS & STORAGE ──────────────────────────────────────────────
const DEFAULTS = {
  prepare: 10, work: 40, rest: 20,
  sets: 8, rounds: 1, roundRest: 60
};

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('itSettings') || '{}');
    return { ...DEFAULTS, ...s };
  } catch { return { ...DEFAULTS }; }
}
function saveSettings(s) {
  localStorage.setItem('itSettings', JSON.stringify(s));
}

let settings = loadSettings();

// ── PRESETS ──────────────────────────────────────────────────────────
function loadPresets() {
  try { return JSON.parse(localStorage.getItem('itPresets') || '[]'); } catch { return []; }
}
function savePresets(list) {
  localStorage.setItem('itPresets', JSON.stringify(list));
}

function setActivePresetName(name) {
  document.getElementById('main-title').textContent = name || '인터벌 타이머';
}

function presetDesc(s) {
  return `운동 ${formatTime(s.work)} · 휴식 ${formatTime(s.rest)} · ${s.sets}세트 × ${s.rounds}라운드`;
}

function renderPresets() {
  const list = loadPresets();
  const el = document.getElementById('preset-list');
  if (list.length === 0) {
    el.innerHTML = '<div class="preset-empty">저장된 프리셋이 없습니다</div>';
    return;
  }
  el.innerHTML = '';
  list.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'preset-item';

    const info = document.createElement('div');
    info.className = 'preset-info';
    info.innerHTML = `<div class="preset-name">${p.name}</div><div class="preset-desc">${presetDesc(p)}</div>`;

    const applyBtn = document.createElement('button');
    applyBtn.className = 'preset-apply';
    applyBtn.textContent = '적용';
    applyBtn.addEventListener('click', () => {
      const { name, ...s } = p;
      Object.assign(settings, s);
      saveSettings(settings);
      setActivePresetName(name);
      updateAllSteppers();
      renderPresets();
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'preset-delete';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => {
      const updated = loadPresets();
      updated.splice(i, 1);
      savePresets(updated);
      renderPresets();
    });

    item.appendChild(info);
    item.appendChild(applyBtn);
    item.appendChild(delBtn);
    el.appendChild(item);
  });
}

// ── AUDIO ────────────────────────────────────────────────────────────
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq, dur, type = 'sine', vol = 0.4) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = type;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function beepShort() { beep(880, 0.1); }
function beepLong()  { beep(440, 0.5); }
function beepWork() {
  beep(880, 0.12, 'square', 0.35);
  setTimeout(() => beep(1100, 0.18, 'square', 0.35), 150);
}
function beepRest() {
  beep(520, 0.15, 'sine', 0.35);
  setTimeout(() => beep(390, 0.35, 'sine', 0.3), 160);
}
function beepDone()  {
  beep(523, 0.2);
  setTimeout(() => beep(659, 0.2), 200);
  setTimeout(() => beep(784, 0.4), 400);
}

// ── VIBRATION ────────────────────────────────────────────────────────
function vibrate(pattern) {
  try { navigator.vibrate && navigator.vibrate(pattern); } catch(e) {}
}

// ── WAKE LOCK ────────────────────────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}
document.addEventListener('visibilitychange', async () => {
  if (wakeLock && document.visibilityState === 'visible' && timer.running) {
    await requestWakeLock();
  }
});

// ── TIMER STATE ───────────────────────────────────────────────────────
const PHASES = { IDLE: 'idle', PREPARE: 'prepare', WORK: 'work', REST: 'rest', ROUND_REST: 'roundRest', DONE: 'done' };

const PHASE_COLORS = {
  [PHASES.IDLE]: 'var(--color-idle)',
  [PHASES.PREPARE]: 'var(--color-prepare)',
  [PHASES.WORK]: 'var(--color-work)',
  [PHASES.REST]: 'var(--color-rest)',
  [PHASES.ROUND_REST]: 'var(--color-round-rest)',
  [PHASES.DONE]: 'var(--color-done)',
};

const PHASE_LABELS = {
  [PHASES.IDLE]: '준비',
  [PHASES.PREPARE]: '준비',
  [PHASES.WORK]: '운동',
  [PHASES.REST]: '휴식',
  [PHASES.ROUND_REST]: '라운드 휴식',
  [PHASES.DONE]: '완료',
};

const timer = {
  running: false,
  phase: PHASES.IDLE,
  currentSet: 0,
  currentRound: 1,
  remaining: 0,       // seconds remaining in current phase
  phaseDuration: 0,   // total duration of current phase
  totalElapsed: 0,    // ms elapsed in current phase (precise)
  lastTick: 0,        // performance.now() at last tick
  raf: null,
  countdownBeepedAt: null, // which seconds we already beeped for
};

function totalWorkDuration() {
  const s = settings;
  const perRound = s.prepare + (s.work + s.rest) * s.sets - s.rest;
  return perRound * s.rounds + s.roundRest * (s.rounds - 1);
}

function resetTimer() {
  cancelAnimationFrame(timer.raf);
  timer.running = false;
  timer.phase = PHASES.IDLE;
  timer.currentSet = 0;
  timer.currentRound = 1;
  timer.remaining = 0;
  timer.phaseDuration = 0;
  timer.totalElapsed = 0;
  timer.countdownBeepedAt = null;
  releaseWakeLock();
  render();
}

function startPhase(phase) {
  timer.phase = phase;
  timer.totalElapsed = 0;
  timer.countdownBeepedAt = null;

  const s = settings;
  const dur = {
    [PHASES.PREPARE]: s.prepare,
    [PHASES.WORK]: s.work,
    [PHASES.REST]: s.rest,
    [PHASES.ROUND_REST]: s.roundRest,
  }[phase] ?? 0;

  timer.phaseDuration = dur;
  timer.remaining = dur;
  render();
}

function nextPhase() {
  const s = settings;
  const p = timer.phase;

  vibrate([80]);

  if (p === PHASES.PREPARE) {
    timer.currentSet = 1;
    beepWork();
    startPhase(PHASES.WORK);
  } else if (p === PHASES.WORK) {
    if (timer.currentSet < s.sets) {
      beepRest();
      startPhase(PHASES.REST);
    } else {
      if (timer.currentRound < s.rounds) {
        beepRest();
        startPhase(PHASES.ROUND_REST);
      } else {
        finishTimer();
      }
    }
  } else if (p === PHASES.REST) {
    timer.currentSet++;
    beepWork();
    startPhase(PHASES.WORK);
  } else if (p === PHASES.ROUND_REST) {
    timer.currentRound++;
    timer.currentSet = 1;
    beepWork();
    startPhase(PHASES.WORK);
  }
}

function finishTimer() {
  timer.running = false;
  timer.phase = PHASES.DONE;
  cancelAnimationFrame(timer.raf);
  releaseWakeLock();
  beepDone();
  vibrate([100, 80, 100, 80, 200]);
  showDone();
  render();
}

function tick(now) {
  if (!timer.running) return;

  // iOS background tab compensation
  if (document.hidden) {
    timer.lastTick = now;
    timer.raf = requestAnimationFrame(tick);
    return;
  }

  const delta = now - timer.lastTick;
  timer.lastTick = now;
  timer.totalElapsed += delta;

  const elapsedSec = timer.totalElapsed / 1000;
  const remaining = Math.max(0, timer.phaseDuration - elapsedSec);
  const prevRemaining = timer.remaining;
  timer.remaining = remaining;

  // countdown beeps: 3, 2, 1 before end
  const remInt = Math.ceil(remaining);
  if (remInt <= 3 && remInt > 0 && remInt !== timer.countdownBeepedAt) {
    timer.countdownBeepedAt = remInt;
    beepShort();
  }

  render();

  if (remaining <= 0) {
    nextPhase();
  }

  if (timer.running) {
    timer.raf = requestAnimationFrame(tick);
  }
}

function startOrPause() {
  if (timer.phase === PHASES.DONE) return;

  // unlock audio on first gesture
  getAudioCtx();

  if (!timer.running) {
    if (timer.phase === PHASES.IDLE) {
      timer.currentSet = 0;
      timer.currentRound = 1;
      startPhase(PHASES.PREPARE);
    }
    timer.running = true;
    timer.lastTick = performance.now();
    requestWakeLock();
    timer.raf = requestAnimationFrame(tick);
  } else {
    timer.running = false;
    cancelAnimationFrame(timer.raf);
    releaseWakeLock();
  }
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────
const elApp = document.getElementById('app');
const elPhaseLabel = document.getElementById('phase-label');
const elTimeDisplay = document.getElementById('time-display');
const elSetInfo = document.getElementById('set-info');
const elRoundInfo = document.getElementById('round-info');
const elProgressFill = document.getElementById('progress-bar-fill');
const elBtnStart = document.getElementById('btn-start');

function formatTime(sec) {
  const s = Math.ceil(sec);
  if (s < 60) return String(s).padStart(2, '0');
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${String(m).padStart(2, '0')}:${String(r).padStart(2, '0')}`;
}

function render() {
  const p = timer.phase;
  const color = PHASE_COLORS[p] || 'var(--color-idle)';
  const s = settings;

  document.documentElement.style.setProperty('--phase-color', color);

  elPhaseLabel.textContent = PHASE_LABELS[p] || '';

  if (p === PHASES.IDLE) {
    elTimeDisplay.textContent = formatTime(s.prepare);
    elSetInfo.textContent = `${s.sets} 세트`;
    elRoundInfo.textContent = `${s.rounds} 라운드`;
    elProgressFill.style.width = '0%';
  } else if (p !== PHASES.DONE) {
    elTimeDisplay.textContent = formatTime(timer.remaining);
    elSetInfo.textContent = `세트 ${timer.currentSet || '—'} / ${s.sets}`;
    elRoundInfo.textContent = `라운드 ${timer.currentRound} / ${s.rounds}`;
    const pct = timer.phaseDuration > 0
      ? (1 - timer.remaining / timer.phaseDuration) * 100
      : 100;
    elProgressFill.style.width = `${Math.min(100, pct)}%`;
  }

  // start button label
  if (p === PHASES.IDLE || !timer.running) {
    elBtnStart.textContent = p === PHASES.IDLE ? '시작' : '재개';
  } else {
    elBtnStart.textContent = '일시정지';
  }

  elBtnStart.disabled = p === PHASES.DONE;
}

// ── DONE OVERLAY ──────────────────────────────────────────────────────
const elDoneOverlay = document.getElementById('done-overlay');
const elDoneSummary = document.getElementById('done-summary');

function showDone() {
  const s = settings;
  elDoneSummary.textContent = `${s.rounds}라운드 × ${s.sets}세트 완료 🔥`;
  elDoneOverlay.classList.add('show');
}

document.getElementById('btn-done-reset').addEventListener('click', () => {
  elDoneOverlay.classList.remove('show');
  resetTimer();
});

// ── SETTINGS MODAL ────────────────────────────────────────────────────
const elModal = document.getElementById('modal');
const elModalOverlay = document.getElementById('modal-overlay');

function openModal() {
  if (timer.running) { timer.running = false; cancelAnimationFrame(timer.raf); releaseWakeLock(); render(); }
  elModal.classList.add('open');
  elModalOverlay.classList.add('open');
  renderPresets();
}
function closeModal() {
  elModal.classList.remove('open');
  elModalOverlay.classList.remove('open');
  saveSettings(settings);
  resetTimer();
}

document.getElementById('btn-settings').addEventListener('click', openModal);
document.getElementById('btn-modal-close').addEventListener('click', closeModal);
elModalOverlay.addEventListener('click', closeModal);

// Build steppers
const stepperUpdaters = {};

document.querySelectorAll('.stepper').forEach(el => {
  const key = el.dataset.key;
  const min = Number(el.dataset.min);
  const max = Number(el.dataset.max);
  const step = Number(el.dataset.step);
  const unit = el.dataset.unit;

  const valEl = document.createElement('input');
  valEl.type = 'text';
  valEl.inputMode = 'numeric';
  valEl.className = 'stepper-val';
  valEl.readOnly = true;

  const minus = document.createElement('button');
  minus.className = 'stepper-btn';
  minus.textContent = '−';
  minus.setAttribute('aria-label', `${key} 감소`);

  const plus = document.createElement('button');
  plus.className = 'stepper-btn';
  plus.textContent = '+';
  plus.setAttribute('aria-label', `${key} 증가`);

  function updateDisplay() {
    const v = settings[key];
    valEl.value = unit === 's' ? formatTime(v) : `${v}${unit}`;
  }
  stepperUpdaters[key] = updateDisplay;

  minus.addEventListener('click', () => {
    settings[key] = Math.max(min, settings[key] - step);
    updateDisplay();
  });
  plus.addEventListener('click', () => {
    settings[key] = Math.min(max, settings[key] + step);
    updateDisplay();
  });

  function activateEdit() {
    valEl.readOnly = false;
    valEl.value = String(settings[key]);
    valEl.focus();
    valEl.select();
  }
  valEl.addEventListener('touchstart', e => {
    e.preventDefault();
    activateEdit();
  }, { passive: false });
  valEl.addEventListener('click', activateEdit);
  valEl.addEventListener('blur', () => {
    const v = parseInt(valEl.value, 10);
    if (!isNaN(v)) settings[key] = Math.min(max, Math.max(min, v));
    valEl.readOnly = true;
    updateDisplay();
  });
  valEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') valEl.blur();
  });

  el.appendChild(minus);
  el.appendChild(valEl);
  el.appendChild(plus);
  updateDisplay();
});

function updateAllSteppers() {
  Object.values(stepperUpdaters).forEach(fn => fn());
  render();
}

// ── PRESET EVENTS ─────────────────────────────────────────────────────
const elNameOverlay = document.getElementById('name-overlay');
const elPresetNameInput = document.getElementById('preset-name-input');

function openNameOverlay() {
  elPresetNameInput.value = '';
  elNameOverlay.classList.add('open');
  setTimeout(() => elPresetNameInput.focus(), 100);
}
function closeNameOverlay() {
  elNameOverlay.classList.remove('open');
}

document.getElementById('btn-save-preset').addEventListener('click', openNameOverlay);
document.getElementById('btn-name-cancel').addEventListener('click', closeNameOverlay);
document.getElementById('btn-name-confirm').addEventListener('click', () => {
  const name = elPresetNameInput.value.trim();
  if (!name) return;
  const list = loadPresets();
  list.unshift({ name, ...settings });
  savePresets(list);
  closeNameOverlay();
  renderPresets();
});
elPresetNameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-name-confirm').click();
});

// ── CONTROLS ──────────────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', startOrPause);
document.getElementById('btn-reset').addEventListener('click', resetTimer);

// Visibility change: correct elapsed time
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && timer.running) {
    timer.lastTick = performance.now();
  }
});

// ── INIT ──────────────────────────────────────────────────────────────
resetTimer();

// Service Worker registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
