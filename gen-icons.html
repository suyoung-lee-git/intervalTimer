<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.18;

  // Background
  ctx.fillStyle = '#1C1C1E';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fill();

  // Outer ring
  const cx = s / 2, cy = s / 2, radius = s * 0.35;
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = s * 0.04;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.stroke();

  // Arc fill (work color)
  ctx.strokeStyle = '#FF3B30';
  ctx.lineWidth = s * 0.06;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx, cy, radius, -Math.PI / 2, Math.PI * 0.9);
  ctx.stroke();

  // Center text
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${s * 0.22}px -apple-system, sans-serif`;
  ctx.fillText('▶', cx, cy);
}

['c192', 'c512'].forEach(id => {
  const c = document.getElementById(id);
  drawIcon(c);
  const a = document.createElement('a');
  a.download = id === 'c192' ? 'icon-192.png' : 'icon-512.png';
  a.href = c.toDataURL('image/png');
  a.textContent = 'Download ' + a.download;
  a.style.display = 'block';
  document.body.appendChild(a);
});
</script>
</body>
</html>
